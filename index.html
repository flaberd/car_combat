<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Combat</title>
    <link rel="stylesheet" href="/src/ui/touchControls.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #111;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>

    <div id="hud" class="hidden">
      <div id="hud-hp-track"><div id="hud-hp-fill"></div></div>
      <div id="hud-hp-text"></div>
      <div id="hud-weapon-text"></div>
    </div>

    <div id="touch-controls" class="hidden">
      <div id="joystick-left" class="joystick">
        <div class="joystick-knob"></div>
      </div>
      <button id="touch-button-switch-prev" class="touch-button" type="button">‹</button>
      <button id="touch-button-switch-next" class="touch-button" type="button">›</button>
      <button id="touch-button-drift" class="touch-button" type="button">Drift</button>
      <button id="touch-button-turbo" class="touch-button" type="button">Turbo</button>
      <button id="touch-button-fire" class="touch-button" type="button">Fire</button>
      <button id="touch-button-use" class="touch-button" type="button">Use</button>
    </div>

    <div id="rotate-prompt" class="hidden">
      <p>Rotate your device to landscape to play.</p>
    </div>

    <div id="start-gate">
      <button id="start-button" type="button">Start</button>
    </div>

    <div id="archetype-select" class="hidden">
      <h1>Choose your vehicle</h1>
      <div id="archetype-options">
        <button class="archetype-button" data-archetype="heavy" type="button">Heavy</button>
        <button class="archetype-button" data-archetype="balanced" type="button">Balanced</button>
        <button class="archetype-button" data-archetype="light" type="button">Light</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
